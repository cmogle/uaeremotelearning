<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Distance Learning Hub</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/javascript">
    const e = React.createElement;

    function App() {
      return e("div", {className: "p-10 text-center"},
        e("h1", {className: "text-3xl font-bold"}, "Distance Learning Hub"),
        e("p", {className: "mt-4"}, "Your full interactive version should be deployed via a web host."),
        e("p", {className: "mt-2"}, "For now, this package confirms structure and can be shared.")
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(e(App));
  </script>
</body>
</html>
